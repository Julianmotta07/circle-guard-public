apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: julianmotta07/circle-guard-auth:latest
        ports:
        - containerPort: 8180
        env:
        - name: SPRING_DATASOURCE_URL
          value: jdbc:postgresql://postgres:5432/circleguard_auth
        - name: SPRING_DATASOURCE_USERNAME
          value: admin
        - name: SPRING_DATASOURCE_PASSWORD
          value: password
        - name: SPRING_LDAP_URLS
          value: ldap://openldap:389
        - name: SPRING_LDAP_BASE
          value: dc=circleguard,dc=edu
        - name: SPRING_LDAP_USERNAME
          value: cn=admin,dc=circleguard,dc=edu
        - name: SPRING_LDAP_PASSWORD
          value: admin
        - name: JWT_SECRET
          value: my-super-secret-dev-key-32-chars-long-12345678
        - name: QR_SECRET
          value: my-qr-secret-key-for-dev-1234567890
        readinessProbe:
          tcpSocket:
            port: 8180
          initialDelaySeconds: 60
          periodSeconds: 15
          failureThreshold: 5
        livenessProbe:
          tcpSocket:
            port: 8180
          initialDelaySeconds: 120
          periodSeconds: 20
          failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  selector:
    app: auth-service
  ports:
  - port: 8180
    targetPort: 8180
  type: ClusterIP