apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity-service
  template:
    metadata:
      labels:
        app: identity-service
    spec:
      containers:
      - name: identity-service
        image: julianmotta07/circle-guard-identity:latest
        ports:
        - containerPort: 8083
        env:
        - name: SPRING_DATASOURCE_URL
          value: jdbc:postgresql://postgres:5432/circleguard_identity
        - name: SPRING_DATASOURCE_USERNAME
          value: admin
        - name: SPRING_DATASOURCE_PASSWORD
          value: password
        - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
          value: kafka:9092
        - name: JWT_SECRET
          value: my-super-secret-dev-key-32-chars-long-12345678
        - name: VAULT_SECRET
          value: 746573742d7365637265742d33322d63686172732d6c6f6e672d313233343536
        - name: VAULT_SALT
          value: deadbeef
        - name: VAULT_HASH_SALT
          value: "12345678"
        readinessProbe:
          tcpSocket:
            port: 8083
          initialDelaySeconds: 60
          periodSeconds: 15
          failureThreshold: 5
        livenessProbe:
          tcpSocket:
            port: 8083
          initialDelaySeconds: 120
          periodSeconds: 20
          failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: identity-service
spec:
  selector:
    app: identity-service
  ports:
  - port: 8083
    targetPort: 8083
  type: ClusterIP